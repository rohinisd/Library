# On every push to main: run Neon DB migrations.
# Vercel and Render auto-deploy from GitHub; this workflow keeps the DB schema in sync.
name: Deploy (migrations + auto-deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate:
    name: Neon migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate-all
        if: ${{ secrets.DATABASE_URL != '' }}
